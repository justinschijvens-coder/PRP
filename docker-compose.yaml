version: '3.8'
services:

  orthia-db:
    image: mariadb:11
    container_name: orthia-db
    restart: always

   environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3306:3306"

    volumes:
      - orthia-db-data:/var/lib/mysql

  apache-web:
    build:
      context: .
      dockerfile: dockerfile

    ports:
      - "8082:80"

    depends_on:
      - orthia-db

volumes:
  orthia-db-data:

