version: '3.8'

services:

  apache:
    build: .
    container_name: apache-web
    ports:
      - "8081:80"
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: orthia-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ortia
      MYSQL_USER: justin
      MYSQL_PASSWORD: @@rdaPPel23
    ports:
      - "8082:80"
      volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
